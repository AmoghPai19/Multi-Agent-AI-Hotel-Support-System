# docker-compose.yml — local development stack.
# Right now it runs just the database; we'll add `backend` and `frontend`
# services in later steps. `docker compose up` gives either teammate an
# identical, disposable Postgres with pgvector already installed.

services:
  db:
    # This image is plain PostgreSQL 16 with the pgvector extension already
    # compiled in — so `CREATE EXTENSION vector` just works, no setup.
    image: pgvector/pgvector:pg16
    container_name: hotel_db
    environment:
      POSTGRES_DB: hotel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}   # dev default; override via .env
    ports:
      - "5432:5432"                                 # host:container
    volumes:
      - dbdata:/var/lib/postgresql/data             # named volume = data survives restarts
      # Init scripts run ONCE, on first boot of an empty data dir, in filename
      # order. We prefix numbers to force: schema -> roles -> seed.
      # NOTE: db/supabase/auth.sql is deliberately NOT mounted here — it needs
      # Supabase's auth.users table and is applied only against the Supabase project.
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/roles.sql:/docker-entrypoint-initdb.d/02_roles.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/03_seed.sql:ro
    healthcheck:                                    # lets other services wait for a READY db
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotel"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dbdata:
